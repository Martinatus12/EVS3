<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IoT - Monitoreo de Rack</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1, h2 {
            color: #333;
        }
        /* Estilos del Formulario (Create) */
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input, select, button {
            padding: 8px;
            margin-top: 5px;
            width: 100%;
            box-sizing: border-box;
        }
        button.btn-primary {
            background-color: #0056b3;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button.btn-primary:hover {
            background-color: #004494;
        }
        
        /* Estilos del Dashboard (Read) */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 5px solid #28a745; /* Verde por defecto (Normal) */
            transition: 0.3s;
        }
        /* Alertas visuales basadas en eventos */
        .card.alert {
            border-left: 5px solid #dc3545; /* Rojo de alerta */
            background-color: #fff3f3;
        }
        .card-header {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .card-body p {
            margin: 5px 0;
        }
        .btn-update {
            background-color: #ffc107;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Monitoreo de Nodos - Rack Principal</h1>

    <div class="form-container">
        <h2>Registrar Nuevo Dispositivo</h2>
        <form id="deviceForm">
            <div class="form-group">
                <label>Nombre del Equipo:</label>
                <input type="text" id="nombreInput" required placeholder="Ej: Switch Piso 2">
            </div>
            <div class="form-group">
                <label>Tipo:</label>
                <select id="tipoInput">
                    <option value="Router">Router</option>
                    <option value="Switch">Switch</option>
                    <option value="Firewall">Firewall</option>
                    <option value="Servidor">Servidor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ancho de Banda (Mbps):</label>
                <input type="number" id="bwInput" required min="1">
            </div>
            <div class="form-group">
                <label>Latencia Inicial (ms):</label>
                <input type="number" id="latenciaInput" required min="1">
            </div>
            <div class="form-group">
                <label>Temperatura Inicial (°C):</label>
                <input type="number" id="tempInput" required min="1">
            </div>
            <button type="submit" class="btn-primary">Añadir Dispositivo</button>
        </form>
    </div>

    <h2>Estado de la Red en Tiempo Real</h2>
    <div class="dashboard" id="dashboardContainer">
        </div>

    <script src="app.js"></script>
</body>
</html>
